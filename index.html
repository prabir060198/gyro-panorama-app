<!DOCTYPE html>
<html>
<head>
  <title>Photo Sphere App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🌐 Photo Sphere Capture</h2>

<video id="video" autoplay playsinline></video>

<p id="status">Status: Waiting...</p>
<p id="angleUI">Yaw: 0° | Pitch: 0°</p>

<div class="btn-group">
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="requestPermission()">Enable Sensors</button>
  <button onclick="captureSingle()">📸 Capture Photo</button>
</div>

<hr>

<div class="btn-group">
  <button onclick="startCapture()">Start Sphere Capture</button>
  <button onclick="createSphere()">Create Sphere</button>
</div>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
