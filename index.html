<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Capture 3D</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<div id="startScreen">
  <h2>📸 360 Capture (3D)</h2>
  <button id="startBtn">Start</button>
</div>

<div id="cameraScreen" class="hidden">
  <div id="cameraContainer">

    <!-- Camera -->
    <video id="video" autoplay playsinline muted></video>

    <!-- 3D Layer -->
    <canvas id="renderCanvas"></canvas>

    <!-- UI -->
    <div id="circle"><div id="progress"></div></div>
    <div id="dot"></div>
    <div id="arrow">⬆</div>

  </div>

  <p id="statusText">Align camera</p>
  <button id="captureBtn">Start Capture</button>
</div>

<div id="resultScreen" class="hidden">
  <h3>Capture Complete</h3>
  <div id="gallery"></div>
  <button id="downloadBtn">Download</button>
</div>

<div id="previewPopup" class="hidden">
  <img id="previewImg">
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
