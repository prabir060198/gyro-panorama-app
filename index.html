<!DOCTYPE html>
<html>

<head>
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>360 Capture Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<!-- START -->
<div id="startScreen">

  <div id="startPanel">
    <h1>360 Capture</h1>
    <p>Professional Locked Capture</p>

    <button id="startBtn">
      START
    </button>
  </div>

</div>

<!-- CAPTURE -->
<div id="captureScreen">

  <canvas id="renderCanvas"></canvas>

  <div id="cameraBox">

    <video
      id="video"
      autoplay
      playsinline
      muted>
    </video>

    <div id="dot"></div>

    <div id="progress"></div>

    <div id="arrow">⬆</div>

  </div>

  <div id="status">
    Initializing...
  </div>

  <div id="debug"></div>

</div>

<!-- RESULT -->
<div id="resultScreen">

  <h2>Capture Complete</h2>

  <div id="gallery"></div>

  <button id="downloadBtn">
    Download ZIP
  </button>

</div>

<canvas id="capCanvas"></canvas>

<script src="script.js"></script>

</body>
</html>
