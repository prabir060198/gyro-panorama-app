<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photosphere Capture</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📸 Photosphere Capture (32 Images)</h2>

<div class="camera-container">
    <video id="video" autoplay playsinline></video>

    <div class="capture-ui">
        <div class="circle">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <!-- Dot -->
    <div id="dot"></div>

    <!-- Arrow -->
    <div id="arrow"></div>
</div>

<canvas id="canvas"></canvas>

<div class="info">
    <p id="angleText">Yaw: 0°</p>
    <p id="targetText">Target: -</p>
    <p id="statusText">Press Start</p>
</div>

<button id="startBtn">Start Capture</button>
<button id="downloadAll">Download All</button>

<h3>Gallery</h3>
<div id="gallery" class="gallery"></div>

<!-- Preview -->
<div id="previewModal" class="modal">
    <img id="previewImg">
</div>

<script src="script.js"></script>
</body>
</html>
