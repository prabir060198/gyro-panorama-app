<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Capture</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h2>📸 360 Capture</h2>
    <button id="startBtn">Start</button>
</div>

<!-- CAMERA -->
<div id="cameraScreen" class="hidden">
    <div id="cameraContainer">
        <video id="video" autoplay playsinline></video>

        <div id="circle"><div id="progress"></div></div>
        <div id="dot"></div>
        <div id="arrow">⬆</div>
    </div>

    <p id="statusText">Align camera</p>
    <button id="captureBtn">Start Capture</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="hidden">
    <h3>Capture Complete</h3>
    <div id="gallery"></div>

    <button id="downloadBtn">Download</button>
    <button id="retakeBtn">Retake</button>
</div>

<!-- PREVIEW -->
<div id="previewPopup" class="hidden">
    <img id="previewImg">
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>

</body>
</html>
