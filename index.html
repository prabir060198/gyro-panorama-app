<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>360 Capture Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<!-- START -->

<div id="startScreen">

  <div id="startPanel">

    <h1>360 Capture</h1>

    <p>
      Locked Environment Panorama
    </p>

    <button id="startBtn">
      START
    </button>

  </div>

</div>

<!-- CAPTURE -->

<div id="captureScreen">

  <canvas id="renderCanvas"></canvas>

  <div id="cameraBox">

    <video
      id="video"
      autoplay
      playsinline
      muted>
    </video>

    <!-- CENTER GUIDE -->

    <div id="centerTarget"></div>

    <!-- MOVING DOT -->

    <div id="dot"></div>

    <!-- PROGRESS -->

    <div id="progress"></div>

    <!-- ARROW -->

    <div id="arrow">⬆</div>

  </div>

  <div id="status">
    Align first capture
  </div>

  <div id="debug"></div>

</div>

<!-- RESULT -->

<div id="resultScreen">

  <h2>Capture Complete</h2>

  <div id="gallery"></div>

  <button id="downloadBtn">
    Download ZIP
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
