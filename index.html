<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Capture</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h2>📸 Capture 360</h2>
    <button id="startCapture">Start</button>
</div>

<!-- CAMERA + GALLERY -->
<div id="cameraScreen" class="hidden">

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>

        <div class="capture-ui">
            <div class="circle">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div id="dot"></div>
        <div id="arrow"></div>
    </div>

    <p id="targetText"></p>
    <p id="statusText">Align</p>

    <div id="gallery" class="gallery"></div>

    <div id="actionBar" class="hidden">
        <button id="downloadAll">Download</button>
        <button id="retake">Retake</button>
    </div>

</div>


<div id="previewModal" class="modal hidden">
    <img id="previewImg"/>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>

</body>
</html>
