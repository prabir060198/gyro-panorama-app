<!DOCTYPE html>
<html>
<head>
  <title>360 Camera App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📸 360 Camera App</h2>

<video id="video" autoplay playsinline></video>

<p id="status">Status: Waiting...</p>
<p id="angleUI">Angle: 0°</p>

<div class="btn-group">
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="requestPermission()">Enable Sensors</button>
  <button onclick="captureSingle()">📸 Capture Photo</button>
</div>

<h3>Gallery</h3>
<div id="gallery"></div>

<hr>

<div class="btn-group">
  <button onclick="startCapture()">Start Panorama</button>
  <button onclick="createPanorama()">Create Panorama</button>
</div>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
