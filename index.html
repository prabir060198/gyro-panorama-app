<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no
">

<title>
Panorama Capture
</title>

<link
rel="stylesheet"
href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script
async
src="https://docs.opencv.org/4.x/opencv.js">
</script>

</head>

<body>

<div id="startScreen">

  <div id="startPanel">

    <h1>
      Panorama Capture
    </h1>

    <div id="modeButtons">

      <button
      class="modeBtn"
      data-mode="horizontal"
      >

        Full Horizontal Panorama

        <span>
          18 Photos
        </span>

      </button>

      <button
      class="modeBtn"
      data-mode="360"
      >

        Full 360 Capture

        <span>
          34 Photos
        </span>

      </button>

    </div>

  </div>

</div>

<div id="captureScreen">

  <div id="cameraBox">

    <video
    id="video"
    autoplay
    playsinline
    muted>
    </video>

    <div id="centerTarget"></div>

    <div id="dot"></div>

    <div id="progress"></div>

    <div id="arrow">
      ⬆
    </div>

  </div>

  <div id="status">
    Initializing...
  </div>

  <div id="debug">
    Loading...
  </div>

</div>

<div id="resultScreen">

  <h2>
    Capture Complete
  </h2>

  <div id="gallery"></div>

  <button id="downloadBtn">
    Download ZIP
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
