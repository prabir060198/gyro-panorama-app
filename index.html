<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Capture</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📸 360 Capture</h2>

<div class="camera-container">
    <video id="video" autoplay playsinline></video>

    <!-- Capture Circle -->
    <div class="capture-ui">
        <div class="circle">
            <div class="progress" id="progress"></div>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<div class="info">
    <p id="angleText">Angle: 0°</p>
    <p id="targetText">Target: 0°</p>
    <p id="statusText">➡️ Move to target</p>
</div>

<button id="startGuide">Start Capture</button>
<button id="downloadAll" class="hidden">Download All</button>

<h3>Gallery</h3>
<div class="gallery" id="gallery"></div>

<!-- Fullscreen Preview -->
<div id="previewModal" class="modal">
    <img id="previewImg">
</div>

<script src="script.js"></script>
</body>
</html>
