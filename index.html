<!DOCTYPE html>
<html>
<head>
  <title>Full 360 Sphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>

<body>

<h2>🌐 Full 360° Photo Sphere</h2>

<div class="camera-container">
  <video id="video" autoplay playsinline></video>

  <div id="overlay">
    <div id="arrow">⬆</div>
  </div>
</div>

<p id="status">Status: Waiting...</p>
<p id="angleUI"></p>

<div>
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="requestPermission()">Enable Sensors</button>
  <button onclick="startCapture()">Start Full Capture</button>
  <button onclick="createViewer()">View Sphere</button>
</div>

<div id="viewer"></div>

</body>
</html>
