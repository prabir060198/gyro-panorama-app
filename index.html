<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
user-scalable=no
">

<title>
Vision Panorama
</title>

<link
rel="stylesheet"
href="style.css">

<script
src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
</script>

<script
async
src="https://docs.opencv.org/4.x/opencv.js">
</script>

</head>

<body>

<div id="loading">
Loading OpenCV...
</div>

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="preview"></canvas>

<div id="overlay">

<div id="center"></div>

<div id="status">
Initializing...
</div>

<div id="debug"></div>

<div id="captureCount">
0
</div>

</div>

<button id="startBtn">
Start Capture
</button>

<script src="script.js"></script>

</body>
</html>
